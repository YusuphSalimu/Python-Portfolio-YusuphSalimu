services:
  # Static Site Service
  - type: web
    name: yusuph-python-portfolio
    env: static
    staticPublishPath: .
    envVars:
      - key: NODE_VERSION
        value: "18"
    headers:
      - path: "/*"
        name: "Cache-Control"
        value: "public, max-age=31536000"
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
